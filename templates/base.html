<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}RapidAPI Platform{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eff6ff', 100:'#dbeafe', 200:'#bfdbfe', 300:'#93c5fd',
                     400:'#60a5fa', 500:'#3b82f6', 600:'#2563eb', 700:'#1d4ed8',
                     800:'#1e40af', 900:'#1e3a8a' }
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #ffffff; color: #1e293b; }
    .card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; }
    .badge-hot { background:#fef2f2; color:#dc2626; }
    .badge-rising { background:#fff7ed; color:#ea580c; }
    .badge-steady { background:#f0fdf4; color:#16a34a; }
    .sidebar-link { transition: all 0.15s; }
    .sidebar-link:hover { background:#eff6ff; color:#2563eb; }
    .sidebar-link.active { background:#dbeafe; color:#1d4ed8; font-weight:600; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="min-h-screen bg-white">
  {% block body %}{% endblock %}
</body>
</html>
